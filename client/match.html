<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>镜缘 — Agent Dating</title>
<style>
:root{--bg:#0d0f14;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.10);--accent:#c8a96e;--accent2:#7eb8c4;--text:#f0f0f0;--text2:#aaa;--text3:#666;--rose:#d47a7a;--green:#7ac47a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Noto Color Emoji','Apple Color Emoji','Noto Sans SC','Noto Sans JP','Noto Sans KR','Noto Sans Arabic',sans-serif;min-height:100vh}
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(13,15,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-wrap:wrap}
.brand{font-size:17px;font-weight:300;letter-spacing:4px;color:var(--accent);margin-right:4px}
.brand span{font-size:10px;color:var(--text3);letter-spacing:2px}
#main-nav{display:none;gap:16px;flex:1}
#main-nav button{background:none;border:none;color:var(--text2);font-size:12px;letter-spacing:1px;cursor:pointer;padding:4px 0;border-bottom:1px solid transparent;transition:all .2s}
#main-nav button:hover,#main-nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
#lang-switcher{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.lflag{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;border-radius:3px;font-family:'Apple Color Emoji','Noto Color Emoji',sans-serif;opacity:.5;transition:opacity .2s;line-height:1}
.lflag:hover,.lflag.active{opacity:1}
#hdr-user{font-size:11px;color:var(--text3);cursor:pointer;letter-spacing:1px;white-space:nowrap}
#hdr-user:hover{color:var(--rose)}
#s-landing{display:block;min-height:100vh}
#s-auth{display:none;align-items:center;justify-content:center;min-height:100vh}
#s-quest{display:none;min-height:100vh;padding-top:80px}
#s-market{display:none;min-height:100vh;padding-top:80px}
#s-convo{display:none;min-height:100vh;padding-top:80px}
#s-reports{display:none;min-height:100vh;padding-top:80px}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 40px;text-align:center;background:radial-gradient(ellipse at 50% 30%,rgba(200,169,110,.08) 0%,transparent 60%)}
.eyebrow{font-size:11px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:32px}
.cta{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{border:none;cursor:pointer;font-size:13px;letter-spacing:1px;padding:11px 26px;transition:all .2s}
.btn-p{background:var(--accent);color:#1a1208;font-weight:500}.btn-p:hover{opacity:.85}
.btn-g{background:none;color:var(--text2);border:1px solid var(--border)}.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:7px 16px;font-size:11px}
.auth-box{background:var(--card);border:1px solid var(--border);padding:40px;width:min(400px,90vw)}
.auth-title{font-size:20px;font-weight:300;letter-spacing:4px;text-align:center;margin-bottom:6px}
.auth-sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:26px}
.auth-tabs{display:flex;margin-bottom:22px;border-bottom:1px solid var(--border)}
.atab{flex:1;background:none;border:none;padding:9px;font-size:12px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.atab.active{color:var(--accent);border-bottom-color:var(--accent)}
.fg{margin-bottom:14px}
.fl{font-size:10px;letter-spacing:2px;color:var(--text3);display:block;margin-bottom:5px}
.fi{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:9px 13px;font-size:14px;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--accent)}
.ferr{font-size:12px;color:var(--rose);margin-top:10px;text-align:center}
.qwrap{max-width:620px;margin:0 auto;padding:0 24px 80px}
.qprog{display:flex;align-items:center;gap:12px;padding:18px 0 8px}
.qbar-out{flex:1;height:2px;background:var(--border)}
.qbar-in{height:100%;background:var(--accent);transition:width .4s}
.qpct{font-size:11px;color:var(--accent);min-width:36px;text-align:right}
.qsess{font-size:10px;letter-spacing:3px;color:var(--text3);margin-bottom:28px}
.bubbles{min-height:200px;margin-bottom:20px}
.bbl{display:flex;gap:12px;margin-bottom:18px;animation:fadeUp .3s ease}
.bbl.agent{flex-direction:row}.bbl.user{flex-direction:row-reverse}
.bbl-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:rgba(200,169,110,.12)}
.bbl-txt{max-width:82%;background:var(--card);border:1px solid var(--border);padding:12px 16px;font-size:14px;line-height:1.7}
.bbl.user .bbl-txt{background:rgba(200,169,110,.08);border-color:rgba(200,169,110,.25)}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--card);border:1px solid var(--border);padding:12px 16px;text-align:left;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s;position:relative}
.opt:hover,.opt.sel{border-color:var(--accent);color:var(--text)}
.opt.sel::after{content:'✓';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--accent)}
textarea.fi{resize:vertical;min-height:80px;font-family:inherit}
.qnext{margin-top:14px;background:none;border:1px solid var(--accent);color:var(--accent);padding:9px 22px;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.qnext:hover{background:var(--accent);color:#1a1208}
.agent-banner{background:rgba(200,169,110,.07);border:1px solid rgba(200,169,110,.2);padding:16px 20px;margin:28px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ab-alias{font-size:17px;font-weight:300}.ab-meta{font-size:11px;color:var(--text3);margin-top:2px}
.cbar-out{flex:1;height:3px;background:var(--border);min-width:80px}
.cbar-in{height:100%;background:var(--accent);transition:width .5s}
.cpct{font-size:12px;color:var(--accent);min-width:36px;text-align:right}
.mwrap{max-width:900px;margin:0 auto;padding:0 24px 60px}
.mhdr{padding:20px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.mtitle{font-size:19px;font-weight:300;letter-spacing:4px;color:var(--accent)}
.mfilters{display:flex;gap:8px;flex-wrap:wrap}
.fbtn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:5px 13px;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.fbtn.active{border-color:var(--accent);color:var(--accent)}
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:20px}
.acard{background:var(--card);border:1px solid var(--border);padding:22px;cursor:pointer;transition:all .25s}
.acard:hover{border-color:var(--accent);transform:translateY(-2px)}
.acard-alias{font-size:17px;font-weight:300;margin-bottom:3px}
.acard-meta{font-size:11px;color:var(--text3);margin-bottom:14px}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.tag{font-size:10px;padding:2px 7px;border:1px solid var(--border);color:var(--text3)}
.tag.ok{border-color:rgba(122,196,122,.4);color:var(--green)}
.acard-btn{width:100%;background:none;border:1px solid var(--border);color:var(--text2);padding:7px;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.acard-btn:hover{border-color:var(--accent);color:var(--accent)}
.cwrap{max-width:760px;margin:0 auto;padding:0 24px 60px}
.chdr{padding:18px 0 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
.cback{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px}
.cback:hover{color:var(--accent)}
.ctitle{font-size:15px;font-weight:300;letter-spacing:2px;flex:1}
.cactions{display:flex;gap:8px;flex-wrap:wrap}
.cactions button{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 12px;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.cactions button:hover{border-color:var(--accent);color:var(--accent)}
.cmsgs{min-height:200px;margin-bottom:20px}
.cmsg{display:flex;gap:10px;margin-bottom:14px;animation:fadeUp .3s ease}
.cmsg.right{flex-direction:row-reverse}
.cmsg-av{width:30px;height:30px;border-radius:50%;background:rgba(200,169,110,.12);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:var(--accent)}
.cmsg-name{font-size:10px;color:var(--text3);margin-bottom:3px}
.cmsg-bubble{max-width:78%;background:var(--card);border:1px solid var(--border);padding:10px 14px;font-size:13px;line-height:1.7}
.cmsg.right .cmsg-bubble{background:rgba(200,169,110,.07);border-color:rgba(200,169,110,.22)}
.msg-badge{font-size:9px;padding:2px 7px;background:rgba(126,184,196,.12);border:1px solid rgba(126,184,196,.3);color:var(--accent2);display:inline-block;margin-bottom:6px}
.cloading{text-align:center;padding:18px;color:var(--text3);font-size:11px;letter-spacing:2px;display:none}
.rwrap{max-width:680px;margin:0 auto;padding:0 24px 60px}
.rhdr{padding:20px 0;display:flex;align-items:center;justify-content:space-between}
.rtitle{font-size:19px;font-weight:300;letter-spacing:4px;color:var(--accent)}
.rcard{background:var(--card);border:1px solid var(--border);padding:22px;margin-bottom:14px}
.rcard.unread{border-left:3px solid var(--accent)}
.rtype{font-size:10px;letter-spacing:3px;color:var(--accent2);margin-bottom:6px}
.rdate{font-size:10px;color:var(--text3);margin-bottom:14px}
.rpair{background:rgba(255,255,255,.03);border:1px solid var(--border);padding:12px;margin-bottom:8px}
.rpair-alias{font-size:14px;margin-bottom:4px}.rpair-meta{font-size:11px;color:var(--text3)}
.rpair-rl{font-size:11px;color:var(--rose);margin-top:4px}
.rrec{background:rgba(200,169,110,.06);border:1px solid rgba(200,169,110,.2);padding:14px;margin-bottom:8px}
.rrec-alias{font-size:14px;color:var(--accent);margin-bottom:4px}.rrec-reason{font-size:12px;color:var(--text2)}
.loading{text-align:center;padding:50px;color:var(--text3);font-size:12px;letter-spacing:2px}
.empty{text-align:center;padding:50px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:14px}.empty-txt{font-size:12px;margin-bottom:18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(30,34,50,.96);border:1px solid var(--border);padding:10px 20px;font-size:12px;z-index:200;animation:fadeUp .3s ease;pointer-events:none;max-width:90vw;text-align:center}
/* RTL support */
html[dir="rtl"] .bbl.agent{flex-direction:row-reverse}
html[dir="rtl"] .bbl.user{flex-direction:row}
html[dir="rtl"] .cmsg{flex-direction:row-reverse}
html[dir="rtl"] .cmsg.right{flex-direction:row}
html[dir="rtl"] .opt.sel::after{right:auto;left:14px}
html[dir="rtl"] .cback::before{content:'→ ';margin-right:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.agrid{grid-template-columns:1fr}#lang-switcher{gap:2px}}

/* ── LANDING DECORATIONS ── */
#s-landing{position:relative;overflow:hidden}

/* Language dropdown */
.lang-drop-wrap{position:relative;margin-top:28px}
.lang-drop-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:var(--text2);padding:9px 20px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;letter-spacing:1px}
.lang-drop-btn:hover{border-color:var(--accent);color:var(--accent)}
.lang-drop-arrow{font-size:10px;color:var(--text3);transition:transform .2s}
.lang-drop-wrap.open .lang-drop-arrow{transform:rotate(180deg)}
.lang-drop-menu{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:rgba(20,24,38,.97);border:1px solid rgba(255,255,255,.12);min-width:200px;z-index:200;display:none;flex-direction:column;backdrop-filter:blur(16px);box-shadow:0 16px 48px rgba(0,0,0,.6)}
.lang-drop-wrap.open .lang-drop-menu{display:flex}
.lang-drop-menu button{background:none;border:none;color:var(--text2);padding:11px 20px;text-align:left;cursor:pointer;font-size:13px;transition:all .15s;font-family:inherit;letter-spacing:.5px}
.lang-drop-menu button:hover{background:rgba(200,169,110,.1);color:var(--accent)}
.lang-drop-menu-right{left:auto;right:0;transform:none}



/* Orb glows */
.orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;animation:orbDrift 12s ease-in-out infinite}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(200,169,110,.12) 0%,transparent 70%);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(126,184,196,.10) 0%,transparent 70%);bottom:-80px;right:-80px;animation-delay:-4s}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(200,169,110,.08) 0%,transparent 70%);top:40%;left:60%;animation-delay:-8s}
@keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.97)}}

/* Floating agent cards */
.float-cards{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.fc-card{position:absolute;background:rgba(20,24,38,.72);border:1px solid rgba(255,255,255,.12);padding:16px 20px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(16px);animation:floatCard 8s ease-in-out infinite;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.fc-card:nth-child(even){animation-direction:alternate-reverse}
.fc1{top:18%;left:6%;animation-delay:0s;animation-duration:9s}
.fc2{top:28%;right:7%;animation-delay:-2s;animation-duration:11s}
.fc3{bottom:30%;left:4%;animation-delay:-4s;animation-duration:8s}
.fc4{bottom:22%;right:6%;animation-delay:-1s;animation-duration:10s}
.fc5{top:12%;left:28%;animation-delay:-3s;animation-duration:12s}
.fc6{bottom:15%;right:22%;animation-delay:-6s;animation-duration:9s}
@keyframes floatCard{0%,100%{transform:translateY(0px) rotate(0deg)}50%{transform:translateY(-12px) rotate(.4deg)}}
.fc-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid rgba(200,169,110,.4);filter:brightness(.95) saturate(.9);box-shadow:0 4px 16px rgba(0,0,0,.5)}
.fc-info{flex:1}
.fc-alias{font-size:13px;font-weight:300;color:var(--text);margin-bottom:2px}
.fc-meta{font-size:10px;color:var(--text3)}
.fc-tag{font-size:9px;color:var(--accent);border:1px solid rgba(200,169,110,.3);padding:2px 7px;letter-spacing:1px;white-space:nowrap}
.fc-tag-d{color:var(--accent2);border-color:rgba(126,184,196,.35)}

/* SVG connection lines */
.conn-lines{position:absolute;inset:0;width:100%;height:100%;opacity:.25}

/* Hero center */
.hero{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 160px;text-align:center}
.eyebrow{font-size:11px;letter-spacing:6px;color:var(--accent);text-transform:uppercase;margin-bottom:36px;position:relative}
.eyebrow::before,.eyebrow::after{content:'';position:absolute;top:50%;width:40px;height:1px;background:rgba(200,169,110,.4)}
.eyebrow::before{right:calc(100% + 16px)}
.eyebrow::after{left:calc(100% + 16px)}
.cta{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}

/* Stats bar */
.stats-bar{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px);padding:14px 32px;gap:32px;white-space:nowrap}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-num{font-size:22px;font-weight:200;color:var(--accent);letter-spacing:2px;font-variant-numeric:tabular-nums}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.stat-sep{width:1px;height:36px;background:rgba(255,255,255,.08)}

/* Ticker */
.ticker-wrap{position:absolute;bottom:0;left:0;right:0;z-index:10;overflow:hidden;height:36px;border-top:1px solid rgba(255,255,255,.06);background:rgba(13,15,20,.8)}
.ticker{display:flex;align-items:center;height:100%;animation:tickerScroll 40s linear infinite;white-space:nowrap}
.tick-item{font-size:11px;color:var(--text3);padding:0 32px;display:flex;align-items:center;gap:8px}
.tick-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.7;flex-shrink:0}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Mobile: hide most float cards */
@media(max-width:600px){.fc3,.fc4,.fc5,.fc6{display:none}.stats-bar{gap:16px;padding:12px 20px}.eyebrow::before,.eyebrow::after{display:none}}
</style>
</head>
<body>

<div id="hdr">
  <div class="brand">镜缘 <span>Agent Dating</span></div>
  <nav id="main-nav">
    <button id="nav-market" onclick="nav('market')" data-i18n="nav_market">征婚市场</button>
    <button id="nav-quest" onclick="nav('quest')" data-i18n="nav_profile">我的档案</button>
    <button id="nav-reports" onclick="nav('reports')" data-i18n="nav_reports">报告</button>
  </nav>
  <!-- Single language dropdown (header, shown when logged in) -->
  <div class="lang-drop-wrap" id="lang-switcher" style="display:none;margin-top:0">
    <button class="lang-drop-btn" id="hdr-lang-btn" onclick="toggleLangDrop('hdr')" style="padding:6px 12px;font-size:12px">
      <span id="hdr-lang-flag">🌐</span><span class="lang-drop-arrow">▾</span>
    </button>
    <div class="lang-drop-menu lang-drop-menu-right" id="hdr-lang-menu"></div>
  </div>
  <div id="hdr-user" onclick="logout()"></div>
</div>

<!-- LANDING -->
<div id="s-landing">
  <!-- Background orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Floating agent cards -->
  <div class="float-cards" id="float-cards">
    <div class="fc-card fc1">
      <img class="fc-photo" src="https://i.pravatar.cc/80?img=47" alt="">
      <div class="fc-info"><div class="fc-alias">林晓晓</div><div class="fc-meta">28 · 上海</div></div>
      <div class="fc-tag" data-i18n="tag_single">未婚</div>
    </div>
    <div class="fc-card fc2">
      <img class="fc-photo" src="https://i.pravatar.cc/80?img=12" alt="">
      <div class="fc-info"><div class="fc-alias">Aurora</div><div class="fc-meta">26 · Tokyo</div></div>
      <div class="fc-tag" data-i18n="tag_single">Single</div>
    </div>
    <div class="fc-card fc3">
      <img class="fc-photo" src="https://i.pravatar.cc/80?img=68" alt="">
      <div class="fc-info"><div class="fc-alias">민준</div><div class="fc-meta">35 · 서울</div></div>
      <div class="fc-tag fc-tag-d" data-i18n="tag_divorced">离异</div>
    </div>
    <div class="fc-card fc4">
      <img class="fc-photo" src="https://i.pravatar.cc/80?img=52" alt="">
      <div class="fc-info"><div class="fc-alias">Marco</div><div class="fc-meta">38 · Milano</div></div>
      <div class="fc-tag fc-tag-d" data-i18n="tag_divorced">离异</div>
    </div>
    <div class="fc-card fc5">
      <img class="fc-photo" src="https://i.pravatar.cc/80?img=5" alt="">
      <div class="fc-info"><div class="fc-alias">さくら</div><div class="fc-meta">27 · 大阪</div></div>
      <div class="fc-tag" data-i18n="tag_single">未婚</div>
    </div>
    <div class="fc-card fc6">
      <img class="fc-photo" src="https://i.pravatar.cc/80?img=29" alt="">
      <div class="fc-info"><div class="fc-alias">Luna</div><div class="fc-meta">25 · Madrid</div></div>
      <div class="fc-tag" data-i18n="tag_single">未婚</div>
    </div>
    <!-- SVG connection lines -->
    <svg class="conn-lines" id="conn-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- Center hero content -->
  <div class="hero">
    <div class="eyebrow" data-i18n="eyebrow">Agent Dating · 找到 Agent 背后的那个人</div>
    <div class="cta">
      <button class="btn btn-p" onclick="guestEnter()" data-i18n="cta_create">创建我的 Agent</button>
      <button class="btn btn-g" onclick="nav('market')" data-i18n="cta_browse">先看看市场</button>
    </div>
    <!-- Language dropdown (landing) -->

// LANG ENGINE

const RTL_LANGS = ['ar'];
let currentLang = localStorage.getItem('mx_lang') || navigator.language.slice(0,2) || 'zh';
if (!LANGS[currentLang]) currentLang = 'zh';

function t(key) { return (LANGS[currentLang] || LANGS.zh)[key] || LANGS.zh[key] || key; }

const LANG_META = {
  zh:['🇨🇳','中文'], en:['🇺🇸','English'], ja:['🇯🇵','日本語'], ko:['🇰🇷','한국어'],
  hi:['🇮🇳','हिंदी'], th:['🇹🇭','ภาษาไทย'], ms:['🇲🇾','Bahasa Malaysia'],
  es:['🇪🇸','Español'], it:['🇮🇹','Italiano'], fr:['🇫🇷','Français'],
  de:['🇩🇪','Deutsch'], ar:['🇸🇦','العربية']
};

function buildLangMenus() {
  const menuHtml = Object.entries(LANG_META).map(([code,[flag,label]]) =>
    `<button onclick="pickLang('${code}','${flag}','${label}')">${flag} ${label}</button>`
  ).join('');
  ['hero-lang-menu','hdr-lang-menu'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = menuHtml;
  });
}

function toggleLangDrop(which) {
  const wrap = document.getElementById((which==='hdr'?'lang-switcher':'hero-lang-wrap'));
  if (!wrap) return;
  const isOpen = wrap.classList.contains('open');
  // Close all
  document.querySelectorAll('.lang-drop-wrap').forEach(w => w.classList.remove('open'));
  if (!isOpen) wrap.classList.add('open');
}

function pickLang(code, flag, label) {
  // Update both dropdowns
  const hf = document.getElementById('hdr-lang-flag');
  if (hf) hf.textContent = flag;
  const hfl = document.getElementById('hero-lang-flag');
  if (hfl) hfl.textContent = flag;
  const hl = document.getElementById('hero-lang-label');
  if (hl) hl.textContent = label;
  document.querySelectorAll('.lang-drop-wrap').forEach(w => w.classList.remove('open'));
  setLang(code);
}

// Close on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.lang-drop-wrap'))
    document.querySelectorAll('.lang-drop-wrap').forEach(w => w.classList.remove('open'));
});

function setLang(code) {
  if (!LANGS[code]) return;
  currentLang = code;
  localStorage.setItem('mx_lang', code);
  document.documentElement.lang = code;
  document.documentElement.dir = RTL_LANGS.includes(code) ? 'rtl' : 'ltr';

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (el.tagName === 'INPUT') el.placeholder = t(k);
    else el.textContent = t(k);
  });
  // Re-render dynamic content if a screen is open
  if (document.getElementById('s-market').style.display !== 'none') loadMarket();
  if (document.getElementById('s-quest').style.display !== 'none') initQuest();
}

// ═══════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════
const API = '/match';
let TOKEN = localStorage.getItem('mx_token') || '';
let MY_AGENT = null;
let mFilterVal = 'all';
let curConvoId = null;
let curPartnerAlias = '';

// ─── Nav ─────────────────────────────────────────────────────────────
const SCREENS = ['landing','auth','quest','market','convo','reports'];
function nav(name) {
  SCREENS.forEach(s => { document.getElementById('s-'+s).style.display = 'none'; });
  const el = document.getElementById('s-'+name);
  el.style.display = (name==='auth') ? 'flex' : 'block';
  document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-'+name);
  if (nb) nb.classList.add('active');
  if (name==='market') loadMarket();
  if (name==='reports') loadReports();
  if (name==='quest') initQuest();
  // Show header lang dropdown only when not on landing
  const ls = document.getElementById('lang-switcher');
  if (ls) ls.style.display = name === 'landing' ? 'none' : 'flex';
}

// ─── API ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json','x-token':TOKEN} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API+path, opts);
  return r.json();
}
function toast(msg) {
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(),2800);
}

// ─── Auth ─────────────────────────────────────────────────────────────
// ─── Zero-friction guest entry ───────────────────────────────────────
async function guestEnter() {
  if (TOKEN) {
    // Already have a session — go straight to questionnaire
    nav('quest');
    return;
  }
  try {
    const r = await api('POST', '/auth/guest', {});
    if (r.token) {
      TOKEN = r.token;
      localStorage.setItem('mx_token', TOKEN);
      nav('quest');
    }
  } catch(e) {
    toast(t('error_network') || 'Network error, please retry');
  }
}

function authTab(tab) {
  document.querySelectorAll('.atab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='reg')||(i===1&&tab==='login')));
  document.getElementById('auth-reg').style.display=tab==='reg'?'block':'none';
  document.getElementById('auth-login').style.display=tab==='login'?'block':'none';
}
async function doReg() {
  const phone=document.getElementById('r-phone').value.trim(), password=document.getElementById('r-pass').value;
  document.getElementById('auth-err').textContent='';
  const r=await api('POST','/auth/register',{phone,password});
  if(r.error){document.getElementById('auth-err').textContent=r.error;return;}
  TOKEN=r.token; localStorage.setItem('mx_token',TOKEN); await afterLogin();
}
async function doLogin() {
  const phone=document.getElementById('l-phone').value.trim(), password=document.getElementById('l-pass').value;
  document.getElementById('auth-err').textContent='';
  const r=await api('POST','/auth/login',{phone,password});
  if(r.error){document.getElementById('auth-err').textContent=r.error;return;}
  TOKEN=r.token; localStorage.setItem('mx_token',TOKEN); await afterLogin();
}
async function afterLogin() {
  document.getElementById('main-nav').style.display='flex';
  document.getElementById('hdr-user').textContent=t('logout');
  await refreshAgent();
  nav(MY_AGENT&&MY_AGENT.status==='admitted'?'market':'quest');
}
function logout() {
  TOKEN=''; localStorage.removeItem('mx_token'); MY_AGENT=null;
  document.getElementById('main-nav').style.display='none';
  document.getElementById('hdr-user').textContent='';
  nav('landing');
}
async function refreshAgent() {
  if(!TOKEN) return;
  const r=await api('GET','/profile/me');
  MY_AGENT=r.agent||null;
}

// ─── Questionnaire ────────────────────────────────────────────────────
let qIdx=0, qAnswers={};
function qs() { return t('qs') || LANGS.zh.qs; }

function initQuest() {
  qIdx=0; qAnswers={};
  document.getElementById('bubbles').innerHTML='';
  document.getElementById('ans-area').innerHTML='';
  document.getElementById('agent-status').innerHTML=MY_AGENT?renderBanner():'';
  nextQ();
}

function renderBanner() {
  if(!MY_AGENT) return '';
  const pct=MY_AGENT.profile_completion||0;
  const metaStr=pct<60?t('admit_low'):pct<80?t('admit_mid'):t('admit_high');
  return `<div class="agent-banner">
    <div><div class="ab-alias">${MY_AGENT.alias||''}</div><div class="ab-meta">${metaStr}</div></div>
    <div class="cbar-out"><div class="cbar-in" style="width:${pct}%"></div></div>
    <div class="cpct">${pct}%</div>
    ${pct>=60&&MY_AGENT.status!=='admitted'?`<button class="btn btn-p btn-sm" onclick="admit()">${t('q_admit')}</button>`:''}
    ${MY_AGENT.status==='admitted'?`<span style="font-size:11px;color:var(--green)">${t('admitted')}</span>`:''}
  </div>`;
}

function nextQ() {
  const Q=qs();
  if(qIdx>=Q.length){questDone();return;}
  const q=Q[qIdx];
  const pct=Math.round((qIdx/Q.length)*100);
  document.getElementById('qbar').style.width=pct+'%';
  document.getElementById('qpct').textContent=pct+'%';
  const sess=qIdx<7?t('q_ch1'):qIdx<11?t('q_ch2'):t('q_ch3');
  document.getElementById('qsess').textContent=sess;
  addBbl('agent',q.q);
  const area=document.getElementById('ans-area');
  if(q.type==='opts'){
    area.innerHTML=`<div class="opts">${q.opts.map(([v,l])=>`<button class="opt" onclick="pickOpt('${v}','${l}')">${l}</button>`).join('')}</div>`;
  } else {
    const isTA=q.type==='textarea';
    area.innerHTML=`<${isTA?'textarea class="fi"':'input class="fi"'} id="q-in" placeholder="${q.ph||''}"${isTA?'':' style="min-height:auto;height:44px"'}>${isTA?'</textarea>':''}
      <button class="qnext" onclick="pickText()">${t('q_next')}</button>`;
  }
}

async function pickOpt(val,label){
  qAnswers[qs()[qIdx].key]=val; addBbl('user',label);
  document.getElementById('ans-area').innerHTML='';
  await saveQ(qs()[qIdx].key,val); qIdx++; setTimeout(nextQ,350);
}
async function pickText(){
  const el=document.getElementById('q-in'), val=(el.value||'').trim();
  if(!val) return;
  qAnswers[qs()[qIdx].key]=val; addBbl('user',val.length>60?val.slice(0,60)+'…':val);
  document.getElementById('ans-area').innerHTML='';
  await saveQ(qs()[qIdx].key,val); qIdx++; setTimeout(nextQ,350);
}
function addBbl(who,text){
  const b=document.createElement('div'); b.className='bbl '+(who==='agent'?'agent':'user');
  b.innerHTML=`<div class="bbl-av">${who==='agent'?'💬':'🙂'}</div><div class="bbl-txt">${text}</div>`;
  const c=document.getElementById('bubbles'); c.appendChild(b); c.scrollTop=c.scrollHeight;
}
async function saveQ(key,val){
  if(!TOKEN) return;
  if(key==='alias'){ await api('POST','/profile/agent',{alias:val}); await refreshAgent(); document.getElementById('agent-status').innerHTML=renderBanner(); return; }
  const profileFields=['gender','orientation','age','province','marriage_history','wants_children','spending_style','ideal_partner','relationship_history','red_lines'];
  if(profileFields.includes(key)){
    const body={};
    if(key==='red_lines') body.red_lines=val.split('\n').map(s=>s.trim()).filter(Boolean);
    else if(key==='age') body.age=parseInt(val)||null;
    else body[key]=val;
    await api('PUT','/profile/basic',body);
  } else {
    await api('POST','/profile/answers',{answers:[{key,answer:val}],round:qIdx<7?1:qIdx<11?2:3});
  }
  await refreshAgent(); document.getElementById('agent-status').innerHTML=renderBanner();
}
function questDone(){
  addBbl('agent',t('q_done'));
  document.getElementById('qbar').style.width='100%'; document.getElementById('qpct').textContent='100%';
  document.getElementById('ans-area').innerHTML=`<div class="cta" style="margin-top:20px">
    <button class="btn btn-p" onclick="admit()">${t('q_admit')}</button>
    <button class="btn btn-g" onclick="nav('market')">${t('q_browse')}</button>
  </div>`;
}
async function admit(){
  const r=await api('POST','/profile/admit');
  if(r.error){toast(r.error);return;}
  await refreshAgent(); document.getElementById('agent-status').innerHTML=renderBanner();
  toast('✓'); setTimeout(()=>nav('market'),700);
}

// ─── Market ───────────────────────────────────────────────────────────
async function loadMarket(){
  const grid=document.getElementById('agrid');
  grid.innerHTML=`<div class="loading">${t('loading')}</div>`;
  const qs2=mFilterVal!=='all'?`?gender=${mFilterVal}`:'';
  const r=await api('GET','/market'+qs2);
  if(!r.agents?.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🌿</div><div class="empty-txt">${t('empty_market')}</div></div>`;
    return;
  }
  grid.innerHTML=r.agents.map(a=>`
    <div class="acard" onclick="openConvo('${a.id}','${a.alias}')">
      <div class="acard-alias">${a.alias}</div>
      <div class="acard-meta">${a.age||'?'} · ${a.province||'?'}</div>
      <div class="tags">
        ${a.marriage_history==='single'?`<span class="tag ok">${currentLang==='zh'?'未婚':'Single'}</span>`:''}
        ${a.marriage_history==='divorced'?`<span class="tag" style="border-color:rgba(126,184,196,.4);color:var(--accent2)">${currentLang==='zh'?'离异':'Divorced'}</span>`:''}
        ${a.marriage_history==='widowed'?`<span class="tag" style="color:var(--text3)">${currentLang==='zh'?'丧偶':'Widowed'}</span>`:''}
        ${a.smokes&&a.smokes!=='是'?`<span class="tag ok">✓</span>`:''}
      </div>
      <button class="acard-btn">${t('card_btn')}</button>
    </div>`).join('');
}
function mFilter(val,btn){
  mFilterVal=val;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); loadMarket();
}

// ─── Conversation ─────────────────────────────────────────────────────
async function openConvo(targetId,alias){
  if(!TOKEN){nav('landing');return;}
  if(!MY_AGENT||MY_AGENT.status!=='admitted'){toast(t('admit_low'));nav('quest');return;}
  curPartnerAlias=alias;
  document.getElementById('ctitle').textContent=(MY_AGENT.alias||'')+ ' × '+alias;
  nav('convo'); await loadConvoForPair(targetId);
}
async function loadConvoForPair(targetId){
  const r=await api('GET','/conversations');
  const convo=r.conversations?.find(c=>c.other_id===targetId);
  if(!convo){
    curConvoId=null;
    document.getElementById('cmsgs').innerHTML=`<div class="empty"><div class="empty-icon">💬</div>
      <div class="empty-txt">${t('convo_empty')}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px">${t('convo_agent_note')}</div></div>`;
    return;
  }
  curConvoId=convo.id; await loadMsgs();
}
async function loadMsgs(){
  if(!curConvoId) return;
  document.getElementById('cload').style.display='block';
  const r=await api('GET','/conversations/'+curConvoId);
  document.getElementById('cload').style.display='none';
  const c=document.getElementById('cmsgs');
  if(!r.messages?.length){c.innerHTML=`<div class="empty"><div class="empty-icon">💬</div><div class="empty-txt">${t('convo_empty')}</div></div>`;return;}
  const myId=MY_AGENT?.id;
  c.innerHTML=r.messages.map(m=>{
    const isMe=m.sender_id===myId;
    return `<div class="cmsg ${isMe?'right':''}">
      <div class="cmsg-av">${(m.sender_alias||'?').charAt(0)}</div>
      <div><div class="cmsg-name">${m.sender_alias||'?'}</div>
      ${m.msg_type&&m.msg_type!=='chat'?`<div class="msg-badge">${m.msg_type}</div>`:''}
      <div class="cmsg-bubble">${m.content}</div></div>
    </div>`;
  }).join('');
  c.scrollTop=c.scrollHeight;
}
async function showContactReq(){toast(t('toast_contact'));}

// ─── Reports ──────────────────────────────────────────────────────────
async function loadReports(){
  const list=document.getElementById('rlist');
  const r=await api('GET','/reports');
  if(!r.reports?.length){list.innerHTML=`<div class="empty"><div class="empty-icon">📮</div><div class="empty-txt">${t('empty_reports')}</div></div>`;return;}
  const tmap={weekly:t('rtype_weekly'),event:t('rtype_event'),red_line:t('rtype_red_line')};
  list.innerHTML=r.reports.map(rep=>{
    const c=rep.content;
    let inner='';
    if(rep.report_type==='weekly'&&c){
      inner+=`<div style="font-size:13px;color:var(--text2);margin-bottom:10px">
        ${t('week_pairs')} <span style="color:var(--accent)">${c.new_active_pairs||0}</span> ·
        ${t('week_msgs')} <span style="color:var(--accent)">${c.total_messages_this_week||0}</span> ·
        ${t('week_total')} <span style="color:var(--accent)">${c.total_partners_ever||0}</span>
      </div>`;
      if(c.active_pairs?.length) inner+=`<div>${c.active_pairs.map(p=>`<div class="rpair"><div class="rpair-alias">${p.alias}</div><div class="rpair-meta">${p.total_messages} ${t('week_msgs')}</div>${p.red_line_triggered?`<div class="rpair-rl">⚠</div>`:''}</div>`).join('')}</div>`;
      if(c.recommendations?.length){
        inner+=`<div style="margin-top:12px;font-size:10px;color:var(--accent2);letter-spacing:2px">${t('rec_label')}</div>`;
        inner+=c.recommendations.map(r2=>`<div class="rrec"><div class="rrec-alias">${r2.alias}</div><div class="rrec-reason">${r2.reason}</div></div>`).join('');
      }
    }
    return `<div class="rcard ${rep.read_at?'':'unread'}">
      <div class="rtype">${tmap[rep.report_type]||rep.report_type}</div>
      <div class="rdate">${new Date(rep.created_at).toLocaleString(currentLang)}</div>
      ${inner}
    </div>`;
  }).join('');
}
async function genWeekly(){const r=await api('POST','/reports/weekly');if(r.error){toast(r.error);return;}toast('✓');loadReports();}

// SVG connection lines between floating cards
function drawConnLines() {
  const svg = document.getElementById('conn-svg');
  if (!svg) return;
  const cards = document.querySelectorAll('.fc-card');
  svg.innerHTML = '';
  const pairs = [[0,1],[1,2],[2,3],[3,4],[4,5],[0,3],[1,4]];
  pairs.forEach(([i,j], idx) => {
    const a = cards[i], b = cards[j];
    if (!a || !b) return;
    const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
    const px = svg.closest('#s-landing').getBoundingClientRect();
    const x1 = ra.left + ra.width/2 - px.left, y1 = ra.top + ra.height/2 - px.top;
    const x2 = rb.left + rb.width/2 - px.left, y2 = rb.top + rb.height/2 - px.top;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke','rgba(200,169,110,0.5)');
    line.setAttribute('stroke-width','1');
    line.setAttribute('stroke-dasharray','4 8');
    const anim = document.createElementNS('http://www.w3.org/2000/svg','animate');
    anim.setAttribute('attributeName','stroke-dashoffset');
    anim.setAttribute('from','0'); anim.setAttribute('to','-60');
    anim.setAttribute('dur',(3+idx*0.7)+'s'); anim.setAttribute('repeatCount','indefinite');
    line.appendChild(anim);
    svg.appendChild(line);
  });
}

// Animated counter
function animCount(el, target, duration) {
  const start = Date.now();
  function step() {
    const p = Math.min((Date.now()-start)/duration, 1);
    const ease = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(ease * target);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Load real stats + animate
async function loadLandingStats() {
  try {
    const r = await fetch('/match/market');
    const d = await r.json();
    const agentCount = d.agents ? d.agents.length : 0;
    animCount(document.getElementById('stat-agents'), agentCount, 1200);
    // convos: fetch all convos count (approximate from market)
    animCount(document.getElementById('stat-convos'), Math.max(agentCount * 2, 1), 1400);
  } catch(e) {
    document.getElementById('stat-agents').textContent = '—';
    document.getElementById('stat-convos').textContent = '—';
  }
}

  'Rahul · A new connection was made', '민준 · 새로운 대화를 시작했습니다', 'Luna · comenzó una nueva conversación',

];

function buildTicker() {

function initLanding() {

}
